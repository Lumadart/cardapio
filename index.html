<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- ─────────────────────────────
      🍽️ SECTION: META BÁSICA & PWA
    ───────────────────────────── -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f1115">
    <meta name="color-scheme" content="dark">

    <!-- ─────────────────────────────
      🍽️ SECTION: IDENTIDADE & SEO
    ───────────────────────────── -->
    <title>Cardápio para Edvirges</title>
    <meta name="title" content="Cardápio para Edvirges">
    <meta name="description" content="Sistema personalizado de planejamento de refeições e gerenciamento de alimentos.">
    <meta name="author" content="Luma">
    <meta name="robots" content="index, follow">

    <!-- ─────────────────────────────
      🍽️ SECTION: OPEN GRAPH / SOCIAL
    ───────────────────────────── -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Cardápio para Edvirges">
    <meta property="og:description" content="Planejamento semanal de refeições personalizado.">
    <meta property="og:image" content="icon.png">
    <meta property="og:locale" content="pt_BR">

    <!-- ─────────────────────────────
      🍽️ SECTION: FAVICON & PWA ASSETS
    ───────────────────────────── -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">
    <link rel="manifest" href="manifest.json">

    <!-- ─────────────────────────────
      🍽️ SECTION: PERFORMANCE & FONTS
    ───────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- ─────────────────────────────
      🍽️ SECTION: STYLES (Versionado v=1.1)
    ───────────────────────────── -->
    <link rel="stylesheet" href="styles.css?v=1.1">

    <!-- ─────────────────────────────
      🍽️ SECTION: SCRIPTS (Versionado v=1.1)
    ───────────────────────────── -->
    <script defer src="app.js?v=1.1"></script>
</head>

<body>

    <!-- Onde o JavaScript renderiza os cards -->
    <main id="app"></main>

    <!-- ─────────────────────────────
      🍳 SECTION: MODAL DE RECEITA
    ───────────────────────────── -->
    <div id="recipe-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content anim-up" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title">Nome da Receita</h2>
                <button class="close-btn" onclick="closeModal()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="modal-body" id="modal-body">
                <!-- Conteúdo preenchido dinamicamente pelo JS -->
            </div>
            
            <div class="modal-footer">
                <button class="btn-confirm" onclick="closeModal()">Fechar</button>
            </div>
        </div>
    </div>

    <!-- ─────────────────────────────
      🧭 SECTION: Navigation
    ───────────────────────────── -->
    <nav class="bottom-nav">
        <button data-route="semana" class="active">
            <i class="fa-solid fa-calendar-week"></i>
            <span>Semana</span>
        </button>

        <button data-route="refeicoes">
            <i class="fa-solid fa-utensils"></i>
            <span>Refeições</span>
        </button>

        <button data-route="itens">
            <i class="fa-solid fa-list"></i>
            <span>Itens</span>
        </button>
    </nav>

    <!-- Registro do Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log("PWA: Service Worker registrado com sucesso!"))
                    .catch(err => console.log("Erro ao registrar SW:", err));
            });
        }

        // Função básica para fechar o modal (será usada pelo app.js)
        function closeModal(event) {
            document.getElementById('recipe-modal').classList.remove('active');
        }
    </script>
</body>

</html>
